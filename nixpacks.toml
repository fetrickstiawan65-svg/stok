[phases.setup]
nixPkgs = ["php83", "nodejs_20", "npm", "php83Extensions.pdo_mysql", "php83Extensions.mbstring", "php83Extensions.xml", "php83Extensions.curl", "php83Extensions.tokenizer", "php83Extensions.fileinfo"]

[phases.build]
cmds = [
    "composer install --no-dev --optimize-autoloader",
    "npm ci",
    "npm run build",
    "mkdir -p storage/framework/sessions storage/framework/views storage/framework/cache/data",
    "chmod -R 775 storage bootstrap/cache"
]

[start]
cmd = "bash -c 'php artisan migrate --force && php artisan db:seed --class=DefaultUsersSeeder --force && php artisan serve --host=0.0.0.0 --port=${PORT:-8080}'"
